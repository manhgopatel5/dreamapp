<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Social</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  color:white;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#0f2027,#000);
  z-index:10;
}

.title{
  font-size:40px;
  font-weight:bold;
  color:#ff3b3b;
}

.subtitle{
  color:#ffcc00;
  margin-bottom:40px;
}

/* BUTTON */
.btn{
  width:140px;
  height:140px;
  border-radius:50%;
  border:none;
  color:white;
  font-size:18px;
  margin:10px;
  cursor:pointer;
}

.login{
  background:linear-gradient(45deg,#4facfe,#6a11cb);
}

.register{
  background:linear-gradient(45deg,#ff512f,#f09819);
}

/* FORM */
#auth{
  display:none;
  position:fixed;
  inset:0;
  background:#111;
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

.action{
  padding:12px;
  background:#00c6ff;
  border:none;
  border-radius:10px;
  color:white;
}

/* PROFILE */
#profile{
  display:none;
  padding:20px;
  text-align:center;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#333;
  margin:auto;
  background-size:cover;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="title">BATTLE</div>
  <div class="subtitle">SOCIAL</div>

  <div>
    <button class="btn login" onclick="showLogin()">ĐĂNG NHẬP</button>
    <button class="btn register" onclick="showRegister()">ĐĂNG KÝ</button>
  </div>
</div>

<!-- AUTH -->
<div id="auth">
  <h2 id="formTitle"></h2>

  <input id="username" placeholder="Tên">
  <input id="password" type="password" placeholder="Mật khẩu">

  <label>
    <input type="checkbox" id="remember"> Ghi nhớ mật khẩu
  </label>

  <button class="action" onclick="submitAuth()">Xác nhận</button>
  <button onclick="back()">← Quay lại</button>

  <hr>

  <button onclick="fakeTikTok()">Đăng ký bằng TikTok</button>
</div>

<!-- PROFILE -->
<div id="profile">
  <h2>Hồ sơ</h2>

  <div id="avatar" class="avatar"></div>

  <input type="file" onchange="changeAvatar(event)">

  <input id="newName" placeholder="Đổi tên">

  <button onclick="saveProfile()">Lưu</button>
</div>

<script>
let mode = "login";

/* SHOW FORM */
function showLogin(){
  mode="login";
  splash.style.display="none";
  auth.style.display="block";
  formTitle.innerText="Đăng nhập";

  // load nhớ mật khẩu
  let saved = localStorage.getItem("user");
  if(saved){
    let u = JSON.parse(saved);
    username.value = u.name;
    password.value = u.pass;
  }
}

function showRegister(){
  mode="register";
  splash.style.display="none";
  auth.style.display="block";
  formTitle.innerText="Đăng ký";
}

/* SUBMIT */
function submitAuth(){
  let name = username.value;
  let pass = password.value;

  if(!name || !pass){
    alert("Nhập đầy đủ!");
    return;
  }

  let user = {name, pass};

  if(remember.checked){
    localStorage.setItem("user",JSON.stringify(user));
  }

  localStorage.setItem("currentUser",JSON.stringify(user));

  openProfile();
}

/* TIKTOK FAKE */
function fakeTikTok(){
  let user = {
    name:"TikTok_User_"+Math.floor(Math.random()*1000),
    pass:"tiktok"
  };

  localStorage.setItem("currentUser",JSON.stringify(user));
  openProfile();
}

/* PROFILE */
function openProfile(){
  auth.style.display="none";
  profile.style.display="block";

  let user = JSON.parse(localStorage.getItem("currentUser"));
  newName.value = user.name;
}

function saveProfile(){
  let user = JSON.parse(localStorage.getItem("currentUser"));
  user.name = newName.value;

  localStorage.setItem("currentUser",JSON.stringify(user));

  alert("Đã lưu!");
}

/* AVATAR */
function changeAvatar(e){
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    avatar.style.backgroundImage = `url(${reader.result})`;
    localStorage.setItem("avatar",reader.result);
  }

  reader.readAsDataURL(file);
}

/* LOAD AVATAR */
window.onload = ()=>{
  let ava = localStorage.getItem("avatar");
  if(ava){
    avatar.style.backgroundImage = `url(${ava})`;
  }
}

/* BACK */
function back(){
  auth.style.display="none";
  splash.style.display="flex";
}
</script>

</body>
</html>
