<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system;
}

/* background */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  z-index:0;
}

/* profile */
#profileBox{
  position:fixed;
  top:15px;
  left:15px;
  display:none;
  align-items:center;
  gap:10px;
  z-index:5000;
  color:white;
}

#avatar{
  width:36px;
  height:36px;
  border-radius:50%;
}

/* counter */
#counter{
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

/* dots */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
  cursor:pointer;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:28px;
  z-index:3000;
}

/* menu */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  padding:12px 16px;
  border-radius:16px;
  background:rgba(0,0,0,0.4);
  color:white;
}

/* modal */
#modal,#authModal,#profileModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(15px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
}
</style>
</head>

<body>

<div id="profileBox">
  <img id="avatar">
  <div id="name"></div>
</div>

<div id="counter">20 / 20</div>

<!-- MESSAGE -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input" placeholder="Nhập tin...">
    <button onclick="send()">Gửi</button>
  </div>
</div>

<!-- AUTH -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="displayName" placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<!-- PROFILE -->
<div id="profileModal">
  <div class="card">
    <input type="file" id="file">
    <input id="newName" placeholder="Tên mới">
    <button onclick="updateProfile()">Cập nhật</button>
  </div>
</div>

<div id="fab">+</div>
<div id="menu"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIza...",
  authDomain:"dreamapp-ae631.firebaseapp.com",
  projectId:"dreamapp-ae631",
  storageBucket:"dreamapp-ae631.appspot.com"
});

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

window.auth=auth;
window.db=db;
window.storage=storage;
window.ref=ref;
window.uploadBytes=uploadBytes;
window.getDownloadURL=getDownloadURL;
window.addDoc=addDoc;
window.collection=collection;
window.doc=doc;
window.setDoc=setDoc;
window.getDoc=getDoc;
window.signOut=signOut;
window.createUserWithEmailAndPassword=createUserWithEmailAndPassword;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;

/* LOAD MESSAGES */
window.messages=[];
const q=query(collection(db,"thoughts"),orderBy("time","desc"));
onSnapshot(q,(snap)=>{
  window.messages=[];
  snap.forEach(d=>window.messages.push(d.data().msg));
});

/* AUTH STATE */
onAuthStateChanged(auth, async(user)=>{
  window.currentUser=user;

  if(user){
    profileBox.style.display="flex";
    let snap=await getDoc(doc(db,"users",user.uid));
    let data=snap.data();
    name.innerText=data.name;
    avatar.src=data.avatar;
  }else{
    profileBox.style.display="none";
  }

  renderMenu();
});
</script>

<script>
/* MENU */
fab.onclick=()=>menu.classList.toggle("show");

function renderMenu(){
  if(window.currentUser){
    menu.innerHTML=`
      <div class="item" onclick="openProfile()">Profile</div>
      <div class="item" onclick="logout()">Logout</div>
    `;
  }else{
    menu.innerHTML=`
      <div class="item" onclick="openLogin()">Đăng nhập</div>
      <div class="item" onclick="openRegister()">Đăng ký</div>
    `;
  }
}

/* AUTH */
function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Login";
  authBtn.innerText="Login";
  authBtn.onclick=login;
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Register";
  authBtn.innerText="Register";
  authBtn.onclick=register;
}

async function login(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
  authModal.style.display="none";
}

async function register(){
  let u=await createUserWithEmailAndPassword(auth,email.value,password.value);
  await setDoc(doc(db,"users",u.user.uid),{
    name:displayName.value,
    avatar:"https://i.pravatar.cc/150"
  });
  authModal.style.display="none";
}

async function logout(){ await signOut(auth); }

/* DOTS */
let dots=[], available=20;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.className="dot";
  d.style.width="14px";
  d.style.height="14px";
  d.style.background=`hsl(${Math.random()*360},70%,70%)`;

  d.x=Math.random()*innerWidth;
  d.y=Math.random()*innerHeight;
  d.tx=Math.random()*innerWidth;
  d.ty=Math.random()*innerHeight;

  d.onclick=()=>openDot(d);

  document.body.appendChild(d);
  dots.push(d);
}

function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*innerWidth;
      d.ty=Math.random()*innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });
  requestAnimationFrame(animate);
}
animate();

/* CLICK DOT */
function openDot(d){
  if(d.used) return;
  d.used=true;
  d.style.opacity=0;
  setTimeout(()=>d.remove(),300);

  available--;
  counter.innerText=available+" / 20";

  msg.innerText=window.messages[Math.floor(Math.random()*window.messages.length)] || "Chưa có tin";

  modal.style.display="flex";
}

/* SEND */
async function send(){
  if(!currentUser) return alert("Login trước");

  let snap=await getDoc(doc(db,"users",currentUser.uid));
  let data=snap.data();

  await addDoc(collection(db,"thoughts"),{
    msg:input.value,
    name:data.name,
    avatar:data.avatar,
    time:Date.now()
  });

  modal.style.display="none";
  input.value="";
}
</script>

</body>
</html>
