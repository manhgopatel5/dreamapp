<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system, sans-serif;
}

/* ===== BACKGROUND NGOÀI ===== */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  z-index:0;
  filter:brightness(0.75);
  opacity:var(--bgOpacity,1);
  transition:0.3s;
}

/* ===== LOGO ===== */
#title{
  position:fixed;
  top:30%;
  width:100%;
  text-align:center;
  z-index:20;
  color:white;
  font-size:40px;
  font-weight:bold;
}

/* ===== DOT ===== */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
}

/* ===== FAB ===== */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:#6a5cff;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  z-index:5000;
}

/* ===== MENU ===== */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
}

.item{
  padding:10px;
  background:#0008;
  color:white;
  border-radius:10px;
}

/* ===== AUTH ===== */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
  z-index:9999;
}

.card{
  width:80%;
  padding:20px;
  background:#000c;
  color:white;
  border-radius:15px;
}

input,button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ===== GAME SCREEN ===== */
#gameScreen{
  display:none;
  position:fixed;
  inset:0;
  z-index:99999;

  background-image:url('https://raw.githubusercontent.com/manhgopate15/dreamapp/main/5C41187C-9AD8-4C7F-8AA1-5AD53A68C4FE.png');
  background-size:cover;
  background-position:center;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#0008;
  color:white;
}

/* CHARACTER */
#character{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
}

#character img{
  width:160px;
}

/* MENU GAME */
#gameMenu{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<div id="title">BATTLE SOCIAL</div>

<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <button id="authBtn"></button>
  </div>
</div>

<div id="fab">+</div>
<div id="menu"></div>

<!-- GAME -->
<div id="gameScreen">

  <div class="topbar">
    <div id="g_name"></div>
    <div>💰 <span id="g_coin">100</span></div>
  </div>

  <div id="character">
    <img id="avatar" src="https://raw.githubusercontent.com/manhgopate15/dreamapp/main/5C41187C-9AD8-4C7F-8AA1-5AD53A68C4FE.png">
  </div>

  <div id="gameMenu">
    <div onclick="logout()">Logout</div>
  </div>

</div>

<script>

/* MENU */
fab.onclick = ()=> menu.classList.toggle("show");

menu.innerHTML = `
<div class="item" onclick="openLogin()">Login</div>
<div class="item" onclick="openRegister()">Register</div>
`;

function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Login";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Register";
  authBtn.innerText="Register";
}

/* AUTH */
authBtn.onclick=()=>{
  let user=email.value;
  let pass=password.value;

  if(authTitle.innerText==="Register"){
    localStorage.setItem(user,pass);
    alert("OK");
  }else{
    if(localStorage.getItem(user)!==pass){
      alert("Sai");
      return;
    }
    startGame(user);
  }
};

/* START GAME */
function startGame(user){
  authModal.style.display="none";
  title.style.display="none";

  // ẨN nền ngoài
  document.body.style.setProperty("--bgOpacity","0");

  // ẨN dot
  document.querySelectorAll(".dot").forEach(d=>d.remove());

  gameScreen.style.display="block";
  g_name.innerText=user;
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* DOT */
for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.className="dot";
  d.style.width="10px";
  d.style.height="10px";
  d.style.background="pink";
  d.style.left=Math.random()*100+"%";
  d.style.top=Math.random()*100+"%";
  document.body.appendChild(d);
}
</script>

</body>
</html>
