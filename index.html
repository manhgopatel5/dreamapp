<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  overflow:hidden;
  position: relative;
}

body::after {
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
  pointer-events:none;
}

/* counter */
#counter {
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

/* dot */
.dot {
  position:absolute;
  border-radius:50%;
  z-index:5;
}

/* modal */
#modal {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(12px);
  z-index:9999;
}

.card {
  width:85%;
  padding:20px;
  border-radius:20px;
  background:white;
  text-align:center;
}

input {
  width:100%;
  margin-top:10px;
  padding:10px;
}

button {
  margin-top:15px;
  padding:10px 20px;
}
</style>
</head>

<body>

<div id="counter">...</div>

<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <div id="author" style="font-size:12px;color:#666;margin-top:10px"></div>
    <button onclick="send()">Gửi tin mới</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, query, orderBy, limit 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLz0V7iQY-r05cbNQ3Wkz58_p-N-b_HOQ",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
  appId: "1:225789506365:web:24270adca14c2d85864b54"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// global
window.db = db;
window.addDoc = addDoc;
window.collection = collection;
window.deleteDoc = deleteDoc;
window.doc = doc;

// 🔥 REALTIME DOT THEO DB
let dots = [];

const q = query(
  collection(db,"thoughts"),
  orderBy("time","desc"),
  limit(20)
);

onSnapshot(q,(snapshot)=>{
  // xoá dot cũ
  dots.forEach(d=>d.remove());
  dots=[];

  let count=0;

  snapshot.forEach(docu=>{
    let data = docu.data();
    let id = docu.id;

    let d=document.createElement("div");

    let size=12+Math.random()*10;

    d.className="dot";
    d.style.width=size+"px";
    d.style.height=size+"px";
    d.style.background=`hsl(${Math.random()*360},70%,70%)`;
    d.style.boxShadow=`0 0 20px white`;

    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top=Math.random()*window.innerHeight+"px";

    d.onclick=async ()=>{
      // hiển thị
      msg.innerText=data.msg;
      author.innerText="by "+(data.name || "ẩn danh");
      modal.style.display="flex";

      // 🔥 XOÁ DB LUÔN
      await deleteDoc(doc(db,"thoughts",id));
    };

    document.body.appendChild(d);
    dots.push(d);
    count++;
  });

  counter.innerText=count+" messages";
});
</script>

<!-- APP -->
<script>
let popSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

// gửi thử
async function send(){
  let text = prompt("Nhập tin:");

  if(text){
    await addDoc(collection(db,"thoughts"),{
      msg:text,
      name:"ẩn danh",
      time:Date.now()
    });
  }
}

// đóng modal
modal.onclick=(e)=>{
  if(e.target.id==="modal") modal.style.display="none";
};
</script>

</body>
</html>
