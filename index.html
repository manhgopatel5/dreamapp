<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f0f1a;
  color:white;
}

/* profile bar */
#profileBar{
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:2000;
}

#avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  background:#444;
}

#name{
  font-weight:600;
}

/* profile page */
#profilePage{
  position:fixed;
  inset:0;
  background:#111;
  display:none;
  z-index:9999;
  padding:20px;
}

#profilePage img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
}

/* button */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
}

/* input */
input{
  margin-top:10px;
  padding:10px;
  width:100%;
  border-radius:10px;
  border:none;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#6a5cff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
}

/* menu */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:none;
  flex-direction:column;
  gap:10px;
}

.item{
  background:#222;
  padding:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- PROFILE BAR -->
<div id="profileBar" onclick="openProfile()" style="display:none;">
  <img id="avatar" src="">
  <div id="name"></div>
</div>

<!-- PROFILE PAGE -->
<div id="profilePage">
  <h2>👤 Profile</h2>
  <img id="profileAvatar">
  <input type="file" id="file">
  <input id="newName" placeholder="Tên mới">
  <button onclick="updateProfile()">Cập nhật</button>
  <button onclick="closeProfile()">Đóng</button>
</div>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="displayName" placeholder="Tên hiển thị">
  <button onclick="register()">Đăng ký</button>
  <button onclick="login()">Đăng nhập</button>
</div>

<!-- FAB -->
<div id="fab" onclick="toggleMenu()">+</div>

<!-- MENU -->
<div id="menu"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
  storageBucket: "dreamapp-ae631.appspot.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

window.auth=auth;
window.db=db;
window.storage=storage;
window.createUserWithEmailAndPassword=createUserWithEmailAndPassword;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;
window.updateProfileAuth=updateProfile;
window.onAuthStateChanged=onAuthStateChanged;
window.signOut=signOut;
window.doc=doc;
window.setDoc=setDoc;
window.getDoc=getDoc;
window.ref=ref;
window.uploadBytes=uploadBytes;
window.getDownloadURL=getDownloadURL;
window.addDoc=addDoc;
window.collection=collection;

/* detect login */
onAuthStateChanged(auth, async(user)=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("profileBar").style.display="flex";

    let snap = await getDoc(doc(db,"users",user.uid));

    if(snap.exists()){
      let data=snap.data();
      document.getElementById("name").innerText=data.name;
      document.getElementById("avatar").src=data.avatar;
      document.getElementById("profileAvatar").src=data.avatar;
    }

    renderMenu(true);
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("profileBar").style.display="none";
    renderMenu(false);
  }
});
</script>

<script>
const menu = document.getElementById("menu");

/* menu */
function renderMenu(logged){
  if(logged){
    menu.innerHTML=`
      <div class="item" onclick="openProfile()">Profile</div>
      <div class="item" onclick="logout()">Logout</div>
    `;
  }else{
    menu.innerHTML=`
      <div class="item">Chưa đăng nhập</div>
    `;
  }
}

function toggleMenu(){
  menu.style.display = menu.style.display==="flex"?"none":"flex";
}

/* auth */
async function register(){
  let userCred = await createUserWithEmailAndPassword(auth,email.value,password.value);
  let user=userCred.user;

  await updateProfileAuth(user,{
    displayName:displayName.value
  });

  await setDoc(doc(db,"users",user.uid),{
    name:displayName.value,
    avatar:"https://i.pravatar.cc/150"
  });
}

async function login(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
}

async function logout(){
  await signOut(auth);
}

/* profile page */
function openProfile(){
  document.getElementById("profilePage").style.display="block";
}

function closeProfile(){
  document.getElementById("profilePage").style.display="none";
}

/* update profile */
async function updateProfile(){
  let user=auth.currentUser;
  let file=document.getElementById("file").files[0];
  let name=document.getElementById("newName").value;

  let avatarUrl="";

  if(file){
    let storageRef = ref(storage,"avatars/"+user.uid);
    await uploadBytes(storageRef,file);
    avatarUrl = await getDownloadURL(storageRef);
  }

  await setDoc(doc(db,"users",user.uid),{
    name:name || user.displayName,
    avatar:avatarUrl || document.getElementById("avatar").src
  });

  alert("Updated!");
}

/* save message */
async function sendMessage(text){
  let user=auth.currentUser;
  if(!user) return;

  await addDoc(collection(db,"messages"),{
    uid:user.uid,
    text:text,
    time:Date.now()
  });
}
</script>

</body>
</html>
