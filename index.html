<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battle Social</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system;
  background:#0b1d2a;
}

/* background image fallback */
.bg{
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") center/cover no-repeat;
  opacity:0.8;
}

/* canvas */
canvas{
  position:fixed;
  inset:0;
}

/* title */
#title{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.main{
  font-size:60px;
  font-weight:900;
  color:#ff2a2a;
}

.sub{
  font-size:42px;
  margin-top:-10px;
  color:#ffb300;
}

/* buttons */
#actions{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:20px;
}

.btn{
  width:110px;
  height:110px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:700;
  text-transform:uppercase;
  cursor:pointer;
}

.login{
  background:linear-gradient(#4da6ff,#6a5cff);
}

.register{
  background:linear-gradient(#ff4d4d,#ff9f00);
}

/* modal */
#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.card{
  width:80%;
  background:#111;
  padding:20px;
  border-radius:15px;
  color:#fff;
}

input{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#6a5cff;
  color:#fff;
  width:100%;
}
</style>
</head>

<body>

<div class="bg"></div>
<canvas id="c"></canvas>

<div id="title">
  <div class="main">BATTLE</div>
  <div class="sub">SOCIAL</div>
</div>

<div id="actions">
  <div class="btn login" onclick="openLogin()">
    <span>ĐĂNG</span>
    <span>NHẬP</span>
  </div>

  <div class="btn register" onclick="openRegister()">
    <span>ĐĂNG</span>
    <span>KÝ</span>
  </div>
</div>

<div id="modal">
  <div class="card">
    <h3 id="titleModal"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên">
    <button id="btnModal"></button>
  </div>
</div>

<script>
/* SAFE START */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

/* MODAL */
const modal = document.getElementById("modal");
const titleModal = document.getElementById("titleModal");
const btnModal = document.getElementById("btnModal");

function openLogin(){
  modal.style.display="flex";
  titleModal.innerText="Đăng nhập";
  btnModal.innerText="Login";
}

function openRegister(){
  modal.style.display="flex";
  titleModal.innerText="Đăng ký";
  btnModal.innerText="Register";
}

modal.onclick = e=>{
  if(e.target === modal) modal.style.display="none";
};

/* PARTICLES (SAFE) */
let dots = [];

for(let i=0;i<20;i++){
  dots.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2,
    r: 6 + Math.random()*6,
    color: `hsl(${Math.random()*360},70%,70%)`
  });
}

/* LOOP */
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* move */
  for(let i=0;i<dots.length;i++){
    let d = dots[i];

    d.x += d.vx;
    d.y += d.vy;

    /* wall */
    if(d.x < 0 || d.x > canvas.width) d.vx *= -1;
    if(d.y < 0 || d.y > canvas.height) d.vy *= -1;
  }

  /* collision */
  for(let i=0;i<dots.length;i++){
    for(let j=i+1;j<dots.length;j++){

      let a = dots[i];
      let b = dots[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 0.001;

      let min = a.r + b.r;

      if(dist < min){

        let nx = dx / dist;
        let ny = dy / dist;

        let overlap = min - dist;

        a.x -= nx * overlap/2;
        a.y -= ny * overlap/2;
        b.x += nx * overlap/2;
        b.y += ny * overlap/2;

        a.vx -= nx;
        a.vy -= ny;
        b.vx += nx;
        b.vy += ny;
      }
    }
  }

  /* draw */
  for(let d of dots){
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
    ctx.fillStyle = d.color;
    ctx.fill();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
