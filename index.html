<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system;
}

/* BACKGROUND */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  filter:brightness(0.8);
  z-index:0;
}

/* CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:5;
}

/* TITLE */
#title{
  position:fixed;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
}

#title .main{
  font-size:60px;
  font-weight:900;
  background:linear-gradient(#ff5a5a,#ff0000);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 25px red;
}

#title .sub{
  font-size:42px;
  margin-top:-10px;
  background:linear-gradient(#ffd86b,#ff9f00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 25px orange;
}

/* BUTTONS */
#actions{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:15px;
  z-index:20;
}

/* BUTTON BASE */
.btn{
  padding:14px 24px;
  border-radius:40px;
  color:white;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:0.25s;
}

/* LOGIN */
.login{
  background:linear-gradient(135deg,#3aa0ff,#7f6cff);
  box-shadow:0 0 15px #3aa0ff,0 0 30px #7f6cff;
}

/* REGISTER */
.register{
  background:linear-gradient(135deg,#ff4d6d,#ff9f00);
  box-shadow:0 0 15px #ff4d6d,0 0 30px #ff9f00;
}

.btn:active{
  transform:scale(0.95);
}

/* AUTH MODAL */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.75);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- TITLE -->
<div id="title">
  <div class="main">BATTLE</div>
  <div class="sub">SOCIAL</div>
</div>

<!-- BUTTONS -->
<div id="actions">
  <div class="btn login" onclick="openLogin()">🔒 Đăng nhập</div>
  <div class="btn register" onclick="openRegister()">👤 Đăng ký</div>
</div>

<!-- AUTH -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
onresize = resize;

/* AUTH */
const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");
const authBtn = document.getElementById("authBtn");

function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng nhập";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng ký";
  authBtn.innerText="Register";
}

authModal.onclick = (e)=>{
  if(e.target === authModal){
    authModal.style.display="none";
  }
};

/* DOT */
let dots=[];
let touches={};

for(let i=0;i<45;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2,
    size:Math.random()*12+10,
    color:`hsl(${Math.random()*360},70%,70%)`
  });
}

/* TOUCH */
canvas.addEventListener("touchstart",e=>{
  for(let t of e.touches){
    touches[t.identifier]={x:t.clientX,y:t.clientY,vx:0,vy:0};
  }
});

canvas.addEventListener("touchmove",e=>{
  for(let t of e.touches){
    let p=touches[t.identifier];
    if(p){
      p.vx=t.clientX-p.x;
      p.vy=t.clientY-p.y;
      p.x=t.clientX;
      p.y=t.clientY;
    }
  }
});

canvas.addEventListener("touchend",e=>{
  for(let t of e.changedTouches){
    delete touches[t.identifier];
  }
});

/* mouse */
canvas.addEventListener("mousemove",e=>{
  touches["m"]={x:e.clientX,y:e.clientY,vx:0,vy:0};
});

/* ANIMATE */
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{

    d.vx+=(Math.random()-0.5)*0.05;
    d.vy+=(Math.random()-0.5)*0.05;

    for(let id in touches){
      let t=touches[id];

      let dx=t.x-d.x;
      let dy=t.y-d.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<200){
        d.vx+=dx*0.002;
        d.vy+=dy*0.002;
      }

      if(dist<80){
        d.vx+=t.vx*0.2;
        d.vy+=t.vy*0.2;
      }
    }

    d.vx=Math.max(Math.min(d.vx,2),-2);
    d.vy=Math.max(Math.min(d.vy,2),-2);

    d.x+=d.vx;
    d.y+=d.vy;

    d.vx*=0.995;
    d.vy*=0.995;

    if(d.x<0||d.x>canvas.width) d.vx*=-1;
    if(d.y<0||d.y>canvas.height) d.vy*=-1;
  });

  /* COLLISION */
  for(let i=0;i<dots.length;i++){
    for(let j=i+1;j<dots.length;j++){

      let a=dots[i];
      let b=dots[j];

      let dx=b.x-a.x;
      let dy=b.y-a.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      let minDist=(a.size/2+b.size/2);

      if(dist<minDist){

        if(dist===0) dist=0.1;

        let nx=dx/dist;
        let ny=dy/dist;

        let overlap=minDist-dist;

        let push=overlap*0.8;

        a.x-=nx*push;
        a.y-=ny*push;

        b.x+=nx*push;
        b.y+=ny*push;

        let force=overlap*0.1;

        a.vx-=nx*force;
        a.vy-=ny*force;

        b.vx+=nx*force;
        b.vy+=ny*force;
      }
      else if(dist<100){

        let force=(100-dist)*0.0008;

        a.vx-=dx*force;
        a.vy-=dy*force;

        b.vx+=dx*force;
        b.vy+=dy*force;
      }
    }
  }

  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.size/2,0,Math.PI*2);
    ctx.fillStyle=d.color;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
