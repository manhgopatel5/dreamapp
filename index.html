<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system, sans-serif;
}

/* BACKGROUND */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  z-index:0;
  filter:brightness(0.75);
}

/* ================= LOGO GAME ================= */
#title{
  position:fixed;
  top:30%;
  width:100%;
  text-align:center;
  z-index:20;
}

.logo{
  position:relative;
  display:inline-block;
}

/* AURA */
.logo::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:320px;
  height:160px;
  background:radial-gradient(circle,
    rgba(255,80,80,0.6),
    rgba(255,80,80,0.2),
    transparent);
  filter:blur(40px);
  z-index:-1;
  animation:aura 3s ease-in-out infinite;
}

@keyframes aura{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
}

/* BATTLE */
.battle{
  display:block;
  font-size:72px;
  font-weight:900;
  letter-spacing:5px;

  background:linear-gradient(90deg,#ff2d2d,#ff6a00,#ff2d2d);
  background-size:200% auto;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 2px 0 #aa0000,
    0 0 10px rgba(255,50,50,0.9),
    0 0 25px rgba(255,50,50,0.8),
    0 0 60px rgba(255,50,50,0.6),
    0 0 120px rgba(255,50,50,0.5);

  animation:
    glow 2s infinite alternate,
    shine 4s linear infinite,
    pulse 2.5s ease-in-out infinite;
}

/* SOCIAL */
.social{
  display:block;
  margin-top:10px;
  font-size:30px;
  font-weight:800;
  letter-spacing:4px;

  background:linear-gradient(90deg,#ffd000,#ff9a00,#ffd000);
  background-size:200% auto;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 8px rgba(255,200,0,0.9),
    0 0 20px rgba(255,200,0,0.8),
    0 0 40px rgba(255,200,0,0.6);

  animation:shine 5s linear infinite;
}

/* EFFECTS */
@keyframes glow{
  from{
    text-shadow:
      0 0 10px rgba(255,50,50,0.8),
      0 0 25px rgba(255,50,50,0.6);
  }
  to{
    text-shadow:
      0 0 20px rgba(255,100,100,1),
      0 0 40px rgba(255,50,50,0.9),
      0 0 80px rgba(255,50,50,0.7),
      0 0 140px rgba(255,50,50,0.5);
  }
}

@keyframes shine{
  to{ background-position:200% center; }
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

/* ================= DOT ================= */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
  cursor:pointer;
  transition:0.3s;
}

/* ================= FAB ================= */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  z-index:5000;
  cursor:pointer;
  box-shadow:0 0 20px rgba(177,108,255,0.6);
}

/* ================= MENU ================= */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;
  z-index:4000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  padding:12px 18px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  color:white;
  backdrop-filter:blur(10px);
  cursor:pointer;
}

/* ================= AUTH ================= */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.75);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="title">
  <div class="logo">
    <span class="battle">BATTLE</span>
    <span class="social">SOCIAL</span>
  </div>
</div>

<!-- AUTH -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- MENU -->
<div id="menu"></div>

<script>
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");

const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");
const authBtn = document.getElementById("authBtn");

/* MENU */
fab.onclick = () => {
  menu.classList.toggle("show");
};

menu.innerHTML = `
  <div class="item" onclick="openLogin()">Đăng nhập</div>
  <div class="item" onclick="openRegister()">Đăng ký</div>
`;

/* AUTH */
function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng nhập";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng ký";
  authBtn.innerText="Register";
}

authModal.onclick = (e)=>{
  if(e.target === authModal){
    authModal.style.display = "none";
  }
};
authBtn.onclick = () => {
  loginSuccess();
};
function loginSuccess(){
  console.log("login ok");

  authModal.style.display = "none";
  openGame();
}
/* DOT SYSTEM */
let dots=[];

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.className="dot";

  let size = Math.random()*12+10;
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${Math.random()*360},70%,70%)`;

  d.x=Math.random()*innerWidth;
  d.y=Math.random()*innerHeight;
  d.tx=Math.random()*innerWidth;
  d.ty=Math.random()*innerHeight;

  d.onclick=()=>{
    d.style.transform="scale(0)";
    d.style.opacity=0;
    setTimeout(()=>d.remove(),300);
  };

  document.body.appendChild(d);
  dots.push(d);
}

/* ANIMATION */
function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.015;
    d.y+=(d.ty-d.y)*0.015;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*innerWidth;
      d.ty=Math.random()*innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });

  requestAnimationFrame(animate);
}
animate();
</script>
<script>

// PLAYER
let player = {
  hp:100,
  attack:10,
  defense:5
};
// 👉 GỌI HÀM NÀY SAU KHI LOGIN THÀNH CÔNG
function openGame(){
  document.getElementById("gameScreen").style.display = "block";

  document.querySelectorAll("body > div:not(#gameScreen)")
    .forEach(el => el.style.display = "none");
}

// TEST nhanh (bạn có thể xoá)
// setTimeout(openGame, 2000);


// BATTLE
function battle(){
  let enemy = {hp:100, attack:8, defense:4};

  let result = fight(player, enemy);

  if(result === "win"){
    alert("🔥 Thắng!");
  }else{
    alert("💀 Thua!");
  }
}

// COMBAT
function fight(p1, p2){
  while(p1.hp > 0 && p2.hp > 0){
    p2.hp -= Math.max(0, p1.attack - p2.defense);
    if(p2.hp <= 0) return "win";

    p1.hp -= Math.max(0, p2.attack - p1.defense);
  }
  return "lose";
}
player.maxHp = 100;
player.gold = 500;

function updateUI(){
  document.getElementById("atk").innerText = player.attack;
  document.getElementById("def").innerText = player.defense;
  document.getElementById("gold").innerText = player.gold;

  document.getElementById("hpFill").style.width =
    (player.hp/player.maxHp*100) + "%";
}

// hook openGame (không sửa code cũ)
let oldOpenGame = openGame;
openGame = function(){
  oldOpenGame();
  updateUI();
};

// logout
function logout(){
  document.querySelectorAll("body > div:not(#gameScreen)")
    .forEach(el => el.style.display = "block");

  document.getElementById("gameScreen").style.display = "none";
}
</script>
<!-- GAME SCREEN -->
<div id="gameScreen" style="display:none">
<div class="hud">
  <div class="topRow">
    <span>👤 Player</span>
    <span>💰 <span id="gold">500</span></span>
  </div>

  <div class="hpBar">
    <div id="hpFill"></div>
  </div>

  <div class="stats">
    ⚔️ <span id="atk">10</span>
    🛡 <span id="def">5</span>
  </div>
</div>
<style>
#gameScreen{
  position:fixed;
  inset:0;
  background:#0a0a12;
  z-index:9999;
  color:white;
}
.hud{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  z-index:10;
  font-size:14px;
}

.topRow{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.hpBar{
  width:100%;
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:6px;
}

#hpFill{
  height:100%;
  width:100%;
  background:#00f0ff;
}

.stats{
  display:flex;
  justify-content:space-between;
}

.btnLogout{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  background:#ff3b3b;
  border:none;
  border-radius:20px;
  color:white;
}
/* giữ nguyên style gọn nhẹ */
.gameWrap{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  height:420px;
}

.character{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:100px;
  height:100px;
  border-radius:50%;
  background:#00f0ff;
  box-shadow:0 0 20px #00f0ff;
}

.slot{
  position:absolute;
  width:70px;
  height:70px;
  border:2px solid #00f0ff;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.weapon{ top:50%; right:-10px; transform:translateY(-50%);}
.armor{ top:50%; left:-10px; transform:translateY(-50%);}
.pants{ bottom:-10px; left:50%; transform:translateX(-50%);}
.shield{ top:-10px; left:50%; transform:translateX(-50%);}

.btnFight{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:#00f0ff;
  border:none;
  border-radius:20px;
}
</style>

<div class="gameWrap">

  <div class="character"></div>

  <div class="slot weapon">⚔️</div>
  <div class="slot armor">👕</div>
  <div class="slot pants">👖</div>
  <div class="slot shield">🛡</div>

</div>

<button class="btnFight" onclick="battle()">⚔️ Battle</button>
<button class="btnLogout" onclick="logout()">🚪 Logout</button>
</div>
</body>
</html>
