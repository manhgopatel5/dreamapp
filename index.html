<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system;
}

/* BACKGROUND */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  filter:brightness(0.8);
  z-index:0;
}

/* CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:5;
}

/* TITLE */
#title{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
  pointer-events:none;
}

#title .main{
  font-size:60px;
  font-weight:900;
  background:linear-gradient(180deg,#ff5a5a,#ff0000);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 15px rgba(255,0,0,0.8),0 0 40px rgba(255,0,0,0.6);
}

#title .sub{
  font-size:42px;
  font-weight:900;
  margin-top:-10px;
  background:linear-gradient(180deg,#ffd86b,#ff9f00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 15px rgba(255,170,0,0.8);
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  z-index:5000;
}

/* MENU */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;
  z-index:4000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  padding:12px 18px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  color:white;
}

/* AUTH */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.75);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- TITLE -->
<div id="title">
  <div class="main">BATTLE</div>
  <div class="sub">SOCIAL</div>
</div>

<!-- UI -->
<div id="fab">+</div>
<div id="menu"></div>

<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
onresize = resize;

/* UI */
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");
const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");
const authBtn = document.getElementById("authBtn");

fab.onclick = ()=>menu.classList.toggle("show");

menu.innerHTML = `
  <div class="item" onclick="openLogin()">Đăng nhập</div>
  <div class="item" onclick="openRegister()">Đăng ký</div>
`;

function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng nhập";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng ký";
  authBtn.innerText="Register";
}

authModal.onclick = (e)=>{
  if(e.target === authModal){
    authModal.style.display="none";
  }
};

/* DOT */
let dots=[];
let touches={};

for(let i=0;i<40;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2,
    size:Math.random()*12+10,
    color:`hsl(${Math.random()*360},70%,70%)`
  });
}

/* TOUCH */
canvas.addEventListener("touchstart",e=>{
  for(let t of e.touches){
    touches[t.identifier]={x:t.clientX,y:t.clientY,vx:0,vy:0};
  }
});

canvas.addEventListener("touchmove",e=>{
  for(let t of e.touches){
    let p=touches[t.identifier];
    if(p){
      p.vx=t.clientX-p.x;
      p.vy=t.clientY-p.y;
      p.x=t.clientX;
      p.y=t.clientY;
    }
  }
});

canvas.addEventListener("touchend",e=>{
  for(let t of e.changedTouches){
    delete touches[t.identifier];
  }
});

/* mouse */
canvas.addEventListener("mousemove",e=>{
  touches["m"]={x:e.clientX,y:e.clientY,vx:0,vy:0};
});

/* ANIMATE */
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{

    /* idle motion */
    d.vx+=(Math.random()-0.5)*0.03;
    d.vy+=(Math.random()-0.5)*0.03;

    /* touch */
    for(let id in touches){
      let t=touches[id];

      let dx=t.x-d.x;
      let dy=t.y-d.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<200){
        d.vx+=dx*0.002;
        d.vy+=dy*0.002;
      }

      if(dist<80){
        d.vx+=t.vx*0.2;
        d.vy+=t.vy*0.2;
      }
    }

    d.vx=Math.max(Math.min(d.vx,2),-2);
    d.vy=Math.max(Math.min(d.vy,2),-2);

    d.x+=d.vx;
    d.y+=d.vy;

    d.vx*=0.995;
    d.vy*=0.995;

    if(d.x<0||d.x>canvas.width) d.vx*=-1;
    if(d.y<0||d.y>canvas.height) d.vy*=-1;
  });

  /* collision */
  for(let i=0;i<dots.length;i++){
    for(let j=i+1;j<dots.length;j++){

      let a=dots[i];
      let b=dots[j];

      let dx=b.x-a.x;
      let dy=b.y-a.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      let minDist=(a.size/2+b.size/2);

      if(dist<minDist){

        if(dist===0) dist=0.1;

        let nx=dx/dist;
        let ny=dy/dist;

        let overlap=minDist-dist;

        a.x-=nx*overlap/2;
        a.y-=ny*overlap/2;

        b.x+=nx*overlap/2;
        b.y+=ny*overlap/2;

        let force=overlap*0.05;

        a.vx-=nx*force;
        a.vy-=ny*force;

        b.vx+=nx*force;
        b.vy+=ny*force;
      }
    }
  }

  /* draw */
  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.size/2,0,Math.PI*2);
    ctx.fillStyle=d.color;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
