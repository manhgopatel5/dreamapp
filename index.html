<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battle Social</title>

<style>

/* ================= RESET ================= */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system, Arial;
  background:#0b1d2a;
}

/* ================= BACKGROUND ================= */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  filter:brightness(0.9);
  pointer-events:none; /* 🔥 không chặn click */
  z-index:1;
}

/* ================= CANVAS ================= */
canvas{
  position:fixed;
  inset:0;
  pointer-events:none; /* 🔥 không chặn click */
  z-index:2;
}

/* ================= TITLE ================= */
#title{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
}

.main{
  font-size:60px;
  font-weight:900;
  color:#ff2a2a;
  text-shadow:0 0 30px red;
}

.sub{
  font-size:42px;
  margin-top:-10px;
  color:#ffb300;
  text-shadow:0 0 20px orange;
}

/* ================= BUTTONS ================= */
#actions{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:25px;
  z-index:20;
}

.btn{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:700;
  text-transform:uppercase;
  cursor:pointer;
  z-index:30;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.9);
}

.login{
  background:linear-gradient(#4da6ff,#6a5cff);
  box-shadow:0 0 25px #4da6ff;
}

.register{
  background:linear-gradient(#ff4d4d,#ff9f00);
  box-shadow:0 0 25px #ff4d4d;
}

/* ================= MODAL ================= */
#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(15px);
  z-index:100;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.85);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
}

/* ================= FLASH ================= */
#flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  transition:0.5s;
  z-index:200;
}

/* ================= LOADING ================= */
#loading{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#050f18;
  color:white;
  z-index:300;
}

.bar{
  width:70%;
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6a5cff,#ff4d4d);
}

/* ================= HOME ================= */
#home{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  background:#050f18;
  z-index:400;
}
/* ===== FIX CLICK KHÔNG ĐƯỢC ===== */

/* canvas không chặn */
canvas{
  pointer-events:none !important;
  z-index:1 !important;
}

/* background không chặn */
.bg,
body::after{
  pointer-events:none !important;
  z-index:1 !important;
}

/* UI nằm trên */
#title{
  position:fixed;
  z-index:10 !important;
}

#actions{
  position:fixed;
  z-index:20 !important;
}

.btn{
  position:relative;
  z-index:30 !important;
}
</style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="c"></canvas>

<!-- TITLE -->
<div id="title">
  <div class="main">BATTLE</div>
  <div class="sub">SOCIAL</div>
</div>

<!-- BUTTONS -->
<div id="actions">
  <div class="btn login" onclick="openLogin()">
    <span>ĐĂNG</span>
    <span>NHẬP</span>
  </div>

  <div class="btn register" onclick="openRegister()">
    <span>ĐĂNG</span>
    <span>KÝ</span>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="card">
    <h3 id="modalTitle"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên">
    <button onclick="goNext()">TIẾP TỤC</button>
  </div>
</div>

<!-- FLASH -->
<div id="flash"></div>

<!-- LOADING -->
<div id="loading">
  <div class="bar"><div class="fill"></div></div>
  <div style="margin-top:10px;">Loading...</div>
</div>

<!-- HOME -->
<div id="home">
  🎮 Welcome to Battle Social
</div>

<script>

/* ================= LOGIN ================= */
function openLogin(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalTitle").innerText="Đăng nhập";
}

function openRegister(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalTitle").innerText="Đăng ký";
}

/* đóng modal */
document.getElementById("modal").onclick = function(e){
  if(e.target.id==="modal"){
    this.style.display="none";
  }
};

/* ================= FLOW ================= */
function goNext(){

  document.getElementById("modal").style.display="none";

  document.getElementById("title").style.transform="translate(-50%,-50%) scale(1.3)";
  document.getElementById("actions").style.opacity="0";

  let flash=document.getElementById("flash");
  flash.style.opacity="1";

  setTimeout(()=>{
    flash.style.opacity="0";

    let loading=document.getElementById("loading");
    loading.style.display="flex";

    let fill=document.querySelector(".fill");
    let p=0;

    let interval=setInterval(()=>{
      p+=10;
      fill.style.width=p+"%";

      if(p>=100){
        clearInterval(interval);
        loading.style.display="none";
        document.getElementById("home").style.display="flex";
      }

    },200);

  },600);
}

/* ================= PARTICLES ================= */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
onresize=resize;

let dots=[];

for(let i=0;i<20;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2,
    r:6+Math.random()*4,
    color:`hsl(${Math.random()*360},70%,70%)`
  });
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<dots.length;i++){
    let d=dots[i];

    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width) d.vx*=-1;
    if(d.y<0||d.y>canvas.height) d.vy*=-1;
  }

  for(let i=0;i<dots.length;i++){
    for(let j=i+1;j<dots.length;j++){

      let a=dots[i];
      let b=dots[j];

      let dx=b.x-a.x;
      let dy=b.y-a.y;
      let dist=Math.sqrt(dx*dx+dy*dy)||0.001;

      let min=a.r+b.r;

      if(dist<min){

        let nx=dx/dist;
        let ny=dy/dist;
        let overlap=min-dist;

        a.x-=nx*overlap/2;
        a.y-=ny*overlap/2;
        b.x+=nx*overlap/2;
        b.y+=ny*overlap/2;

        a.vx-=nx;
        a.vy-=ny;
        b.vx+=nx;
        b.vy+=ny;
      }
    }
  }

  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=d.color;
    ctx.fill();
  });

  requestAnimationFrame(loop);
}
loop();
document.querySelector(".login").onclick = ()=>{
  alert("OK LOGIN");
};
</script>

</body>
</html>
