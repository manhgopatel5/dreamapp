<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  position: relative;
  z-index: 0;
  margin:0;
  overflow:hidden;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("IMG_0577.jpeg") no-repeat center;
  background-size: contain;
  pointer-events: none;
  z-index: 0;
}

/* counter */
#counter {
  position: fixed;
  top: 60px;
  width: 100%;
  text-align: center;
  font-size: 18px;
  letter-spacing: 4px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
  z-index: 10;
}

/* dots */
.dot {
  position: absolute;
  border-radius: 50%;
  transition: transform 0.2s;
  z-index: 2;
}

.dot:active {
  transform: scale(1.8);
}

/* modal */
#modal {
  position: fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter: blur(12px);
  z-index: 9999;
}

/* card */
.card {
  width:85%;
  padding:30px;
  border-radius:30px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  text-align:center;
}

/* input */
input {
  width:100%;
  margin-top:20px;
  padding:10px;
  border:none;
  border-bottom:1px solid #ccc;
  background:none;
}

button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
}
</style>
</head>

<body>

<div id="counter">20 / 20</div>

<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input" placeholder="Thì thầm điều gì đó...">
    <button onclick="send()">SEND</button>
  </div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLz0V7iQY-r05cbNQ3Wkz58_p-N-b_HOQ",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
  storageBucket: "dreamapp-ae631.firebasestorage.app",
  messagingSenderId: "225789506365",
  appId: "1:225789506365:web:24270adca14c2d85864b54"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// global cho script dưới
window.db = db;
window.addDoc = addDoc;
window.collection = collection;
</script>

<!-- 🔥 APP -->
<script>
let popSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

let dots = [];
let available = 20;
let current=null;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.used=false;

  let hue=Math.random()*360;
  let size=Math.random()*14+10;

  d.className="dot";
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${hue},70%,70%)`;
  d.style.boxShadow=`0 0 20px hsl(${hue},80%,70%)`;

  d.x=Math.random()*window.innerWidth;
  d.y=Math.random()*window.innerHeight;
  d.tx=Math.random()*window.innerWidth;
  d.ty=Math.random()*window.innerHeight;

  d.msg="Tap để viết điều gì đó ✨";

  d.style.left=d.x+"px";
  d.style.top=d.y+"px";

  d.onclick=()=>open(d);

  document.body.appendChild(d);
  dots.push(d);
}

function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*window.innerWidth;
      d.ty=Math.random()*window.innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });
  requestAnimationFrame(animate);
}
animate();

function open(d){
  if(d.used) return;

  d.used=true;
  current=d;

  if (navigator.vibrate) navigator.vibrate(30);
  popSound.currentTime=0;
  popSound.play().catch(()=>{});

  d.style.opacity=0;
  setTimeout(()=>d.remove(),300);

  available--;
  document.getElementById("counter").innerText=available+" / 20";

  document.getElementById("modal").style.display="flex";
}

async function send(){
  let text=document.getElementById("input").value;

  if(text.trim()!==""){
    await addDoc(collection(db,"thoughts"),{
      msg:text,
      time:Date.now()
    });
  }

  document.getElementById("modal").style.display="none";
  document.getElementById("input").value="";
}

document.getElementById("modal").onclick=(e)=>{
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
};
</script>

</body>
</html>
