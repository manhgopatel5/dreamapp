<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  overflow:hidden;
  position:relative;
}

body::after {
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
}

/* counter */
#counter{
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

/* dot */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:2;
  transition:0.2s;
}

/* modal */
#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(12px);
  z-index:9999;
}

.card{
  width:85%;
  padding:30px;
  border-radius:30px;
  background:rgba(255,255,255,0.7);
  text-align:center;
}
</style>
</head>

<body>

<div id="counter">Loading...</div>

<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input" placeholder="Viết gì đó...">
    <button onclick="send()">SEND</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
  appId: "1:225789506365:web:24270adca14c2d85864b54"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dots = [];

const q = query(collection(db,"thoughts"), orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{

  // xoá dot cũ
  dots.forEach(d=>d.remove());
  dots=[];

  let count=0;

  snapshot.forEach(doc=>{
    let data=doc.data();

    let d=document.createElement("div");

    let size=Math.random()*14+10;
    let hue=Math.random()*360;

    d.className="dot";
    d.style.width=size+"px";
    d.style.height=size+"px";
    d.style.background=`hsl(${hue},70%,70%)`;
    d.style.boxShadow=`0 0 20px hsl(${hue},80%,70%)`;

    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top=Math.random()*window.innerHeight+"px";

    d.onclick=()=>{
      document.getElementById("msg").innerText=data.msg;
      document.getElementById("modal").style.display="flex";
    };

    document.body.appendChild(d);
    dots.push(d);
    count++;
  });

  document.getElementById("counter").innerText=count+" messages";
});

// global
window.db=db;
window.addDoc=addDoc;
window.collection=collection;
</script>

<!-- APP -->
<script>
async function send(){
  let text=document.getElementById("input").value;

  if(text.trim()!==""){
    await addDoc(collection(db,"thoughts"),{
      msg:text,
      time:Date.now()
    });
  }

  document.getElementById("modal").style.display="none";
  document.getElementById("input").value="";
}

document.getElementById("modal").onclick=(e)=>{
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
};
</script>

</body>
</html>
