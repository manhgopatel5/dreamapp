<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0a0a14;
  color:white;
}

/* animated gradient */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(270deg,#6a5cff,#b16cff,#00e5ff,#6a5cff);
  background-size:800% 800%;
  animation:bg 20s infinite;
  opacity:0.15;
}
@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* AUTH */
#auth{
  padding:30px;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  margin-top:15px;
  padding:14px;
  width:48%;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
}

/* APP */
#app{
  display:none;
}

/* header */
#header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px;
}

#avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

/* feed */
#feed{
  padding:15px;
}

.msg{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:16px;
  margin-bottom:10px;
}

.msg .name{
  font-weight:600;
  font-size:13px;
  opacity:0.7;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* modal */
#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
}

.card{
  width:85%;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:20px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h2>✨ Neon App</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="nameInput" placeholder="Tên hiển thị">
  <div style="display:flex; gap:10px;">
    <button onclick="register()">Đăng ký</button>
    <button onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="header">
    <img id="avatar">
    <div id="name"></div>
    <div style="margin-left:auto;" onclick="logout()">🚪</div>
  </div>

  <div id="feed"></div>

</div>

<!-- FAB -->
<div id="fab" onclick="openModal()">+</div>

<!-- MODAL -->
<div id="modal">
  <div class="card">
    <input id="msgInput" placeholder="Viết gì đó...">
    <input type="file" id="file">
    <button onclick="send()">Gửi</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIza...",
  authDomain:"dreamapp-ae631.firebaseapp.com",
  projectId:"dreamapp-ae631",
  storageBucket:"dreamapp-ae631.appspot.com"
});

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

window.auth=auth;
window.db=db;
window.storage=storage;
window.createUserWithEmailAndPassword=createUserWithEmailAndPassword;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;
window.signOut=signOut;
window.updateProfile=updateProfile;
window.collection=collection;
window.addDoc=addDoc;
window.query=query;
window.orderBy=orderBy;
window.onSnapshot=onSnapshot;
window.doc=doc;
window.setDoc=setDoc;
window.getDoc=getDoc;
window.ref=ref;
window.uploadBytes=uploadBytes;
window.getDownloadURL=getDownloadURL;

onAuthStateChanged(auth, async(user)=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    let snap=await getDoc(doc(db,"users",user.uid));
    let data=snap.data();

    document.getElementById("name").innerText=data.name;
    document.getElementById("avatar").src=data.avatar;

    loadFeed();
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});
</script>

<script>
async function register(){
  let userCred=await createUserWithEmailAndPassword(auth,email.value,password.value);
  let user=userCred.user;

  await setDoc(doc(db,"users",user.uid),{
    name:nameInput.value,
    avatar:"https://i.pravatar.cc/150"
  });
}

async function login(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
}

async function logout(){
  await signOut(auth);
}

/* feed realtime */
function loadFeed(){
  const q=query(collection(db,"messages"),orderBy("time","desc"));

  onSnapshot(q,(snap)=>{
    let html="";
    snap.forEach(doc=>{
      let d=doc.data();
      html+=`
        <div class="msg">
          <div class="name">${d.name}</div>
          <div>${d.text}</div>
        </div>
      `;
    });
    document.getElementById("feed").innerHTML=html;
  });
}

/* modal */
function openModal(){
  modal.style.display="flex";
}

/* send */
async function send(){
  let user=auth.currentUser;
  let file=document.getElementById("file").files[0];
  let avatar="";

  if(file){
    let r=ref(storage,"avatars/"+user.uid);
    await uploadBytes(r,file);
    avatar=await getDownloadURL(r);
  }

  let snap=await getDoc(doc(db,"users",user.uid));
  let data=snap.data();

  await addDoc(collection(db,"messages"),{
    text:msgInput.value,
    name:data.name,
    avatar:data.avatar,
    time:Date.now()
  });

  modal.style.display="none";
}
</script>

</body>
</html>
