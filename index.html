<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system;
}

/* background */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  z-index:0;
}

/* counter */
#counter{
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

/* dots */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
  cursor:pointer;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:28px;
  z-index:5000; /* 🔥 FIX */
  cursor:pointer;
}

/* MENU */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;

  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;

  z-index:4000; /* 🔥 FIX */
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  padding:12px 16px;
  border-radius:16px;
  background:rgba(0,0,0,0.5);
  color:white;
}

/* modal */
#modal,#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(15px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.7);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
}
</style>
</head>

<body>

<div id="counter">20 / 20</div>

<!-- MESSAGE -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input" placeholder="Nhập tin...">
    <button onclick="send()">Gửi</button>
  </div>
</div>

<!-- AUTH -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="displayName" placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- MENU -->
<div id="menu"></div>

<script>
/* 🔥 FIX QUAN TRỌNG */
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");
const modal = document.getElementById("modal");
const msg = document.getElementById("msg");
const input = document.getElementById("input");
const counter = document.getElementById("counter");

/* MENU TOGGLE */
fab.onclick = () => {
  menu.classList.toggle("show");
};

/* MENU CONTENT */
function renderMenu(){
  menu.innerHTML = `
    <div class="item" onclick="openLogin()">Đăng nhập</div>
    <div class="item" onclick="openRegister()">Đăng ký</div>
  `;
}
renderMenu();

/* AUTH UI */
function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Login";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Register";
  authBtn.innerText="Register";
}

/* DOTS */
let dots=[], available=20;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.className="dot";

  let size = Math.random()*12+10;
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${Math.random()*360},70%,70%)`;

  d.x=Math.random()*innerWidth;
  d.y=Math.random()*innerHeight;
  d.tx=Math.random()*innerWidth;
  d.ty=Math.random()*innerHeight;

  d.onclick=()=>openDot(d);

  document.body.appendChild(d);
  dots.push(d);
}

/* ANIMATE */
function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*innerWidth;
      d.ty=Math.random()*innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });

  requestAnimationFrame(animate);
}
animate();

/* CLICK DOT */
function openDot(d){
  if(d.used) return;

  d.used=true;
  d.style.opacity=0;
  setTimeout(()=>d.remove(),300);

  available--;
  counter.innerText=available+" / 20";

  msg.innerText="Một lời nhắn ngẫu nhiên ✨";
  modal.style.display="flex";
}

/* SEND */
function send(){
  modal.style.display="none";
  input.value="";
}
</script>

</body>
</html>
