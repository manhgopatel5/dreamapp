<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  overflow:hidden;
}

/* nền */
#bg{
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
}

/* dot */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:10; /* 👈 luôn nổi */
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  color:white;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:20;
}

/* menu */
#menu{
  position:fixed;
  bottom:90px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transform:translateY(20px);
  transition:0.3s;
  z-index:20;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  background:black;
  color:white;
  padding:10px;
  border-radius:20px;
}

/* modal */
#modal, #authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(12px);
  z-index:999;
}

.card{
  background:white;
  padding:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- nền -->
<div id="bg"></div>

<!-- modal -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
  </div>
</div>

<div id="authModal">
  <div class="card">
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<div id="menu">
  <div class="item" onclick="openAuth()">Đăng nhập</div>
  <div class="item">Cài đặt</div>
  <div class="item">Điều khoản</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLz0V7iQY-r05cbNQ3Wkz58_p-N-b_HOQ",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
  appId: "1:225789506365:web:24270adca14c2d85864b54"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.auth=auth;
window.createUserWithEmailAndPassword=createUserWithEmailAndPassword;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;

let dots=[];
const q=query(collection(db,"thoughts"),orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
  dots.forEach(d=>d.remove());
  dots=[];

  snapshot.forEach(doc=>{
    let d=document.createElement("div");

    let size=12+Math.random()*10;

    d.className="dot";
    d.style.width=size+"px";
    d.style.height=size+"px";
    d.style.background="white";

    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top=Math.random()*window.innerHeight+"px";

    d.onclick=()=>{
      msg.innerText=doc.data().msg;
      modal.style.display="flex";
    };

    document.body.appendChild(d);
    dots.push(d);
  });
});
</script>

<!-- APP -->
<script>
fab.onclick=()=>{
  menu.classList.toggle("show");
};

function openAuth(){
  authModal.style.display="flex";
}

async function login(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
  alert("OK");
}

async function register(){
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("OK");
}

modal.onclick=(e)=>{
  if(e.target.id==="modal") modal.style.display="none";
};

authModal.onclick=(e)=>{
  if(e.target.id==="authModal") authModal.style.display="none";
};
</script>

</body>
</html>
