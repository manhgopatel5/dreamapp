<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* background */
body::after {
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
}

/* counter */
#counter {
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  font-size:18px;
  letter-spacing:4px;
  color:white;
  text-shadow:0 0 10px rgba(255,255,255,0.7);
  z-index:10;
}

/* dots */
.dot {
  position:absolute;
  border-radius:50%;
  z-index:5;
}

/* modal */
#modal, #authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(15px);
  z-index:9999;
}

.card {
  width:85%;
  padding:30px;
  border-radius:30px;

  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    inset 0 0 20px rgba(255,255,255,0.1);

  text-align:center;
  color:white;
}

/* input */
input {
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* button */
button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  box-shadow:0 0 20px rgba(150,100,255,0.6);
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;

  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);

  color:white;
  font-size:30px;

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:1000;
  cursor:pointer;

  transition:0.3s;
}

/* MENU */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;

  display:flex;
  flex-direction:column;
  gap:14px;

  opacity:0;
  pointer-events:none;
  transform:translateY(30px);

  transition:0.3s;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

/* ITEM XỊN */
.item{
  display:flex;
  align-items:center;
  gap:12px;

  padding:14px 18px;
  border-radius:999px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.15);

  color:white;
  font-weight:500;

  box-shadow:
    0 6px 25px rgba(0,0,0,0.35),
    inset 0 0 10px rgba(255,255,255,0.08);

  transition:0.25s;
}

/* icon */
.item span{
  width:32px;
  height:32px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,0.15);
}

/* hover */
.item:active{
  transform:scale(0.92);
}

/* PRIMARY (login) */
.item.primary{
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  border:none;

  box-shadow:
    0 0 25px rgba(150,100,255,0.7),
    0 0 50px rgba(150,100,255,0.3);
}

/* animation */
#menu.show .item{
  animation:slideUp 0.4s ease forwards;
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<div id="counter">20 / 20</div>

<!-- modal -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input" placeholder="Thì thầm điều gì đó...">
    <button onclick="send()">SEND</button>
  </div>
</div>

<!-- auth -->
<div id="authModal">
  <div class="card">
    <h3>🔐 Đăng nhập / Đăng ký</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- MENU -->
<div id="menu">
  <div class="item primary" onclick="openAuth()">
    <span>🔐</span> Đăng nhập / Đăng ký
  </div>

  <div class="item">
    <span>⚙️</span> Cài đặt
  </div>

  <div class="item">
    <span>📜</span> Điều khoản
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.messages = [];

const q = query(collection(db,"thoughts"), orderBy("time","desc"));

onSnapshot(q, (snapshot)=>{
  window.messages = [];
  snapshot.forEach(doc=>{
    window.messages.push(doc.data().msg);
  });
});

window.db=db;
window.addDoc=addDoc;
window.collection=collection;
window.auth=auth;
window.createUserWithEmailAndPassword=createUserWithEmailAndPassword;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;
</script>

<!-- APP -->
<script>
let popSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

let dots=[];
let available=20;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.used=false;

  let hue=Math.random()*360;
  let size=Math.random()*14+10;

  d.className="dot";
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${hue},70%,70%)`;
  d.style.boxShadow=`0 0 20px hsl(${hue},80%,70%)`;

  d.x=Math.random()*window.innerWidth;
  d.y=Math.random()*window.innerHeight;
  d.tx=Math.random()*window.innerWidth;
  d.ty=Math.random()*window.innerHeight;

  d.style.left=d.x+"px";
  d.style.top=d.y+"px";

  d.onclick=()=>open(d);

  document.body.appendChild(d);
  dots.push(d);
}

function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*window.innerWidth;
      d.ty=Math.random()*window.innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });
  requestAnimationFrame(animate);
}
animate();

function open(d){
  if(d.used) return;

  d.used=true;

  popSound.currentTime=0;
  popSound.play().catch(()=>{});

  d.style.opacity=0;
  setTimeout(()=>d.remove(),300);

  available--;
  counter.innerText=available+" / 20";

  let randomMsg = window.messages[Math.floor(Math.random()*window.messages.length)] 
    || "Chưa có ai gửi...";

  msg.innerText=randomMsg;
  modal.style.display="flex";
}

async function send(){
  let text=input.value;

  if(text.trim()!==""){
    await addDoc(collection(db,"thoughts"),{
      msg:text,
      time:Date.now()
    });
  }

  modal.style.display="none";
  input.value="";
}

/* FAB */
fab.onclick=()=>{
  menu.classList.toggle("show");
  fab.style.transform = menu.classList.contains("show") ? "rotate(45deg)" : "rotate(0)";
};

function openAuth(){
  authModal.style.display="flex";
}

/* login */
async function login(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
  alert("Đăng nhập thành công");
}

/* register */
async function register(){
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("Đăng ký thành công");
}

/* close */
modal.onclick=(e)=>{
  if(e.target.id==="modal") modal.style.display="none";
};

authModal.onclick=(e)=>{
  if(e.target.id==="authModal") authModal.style.display="none";
};
</script>

</body>
</html>
