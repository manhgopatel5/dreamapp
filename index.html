<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* background */
body::after {
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
}

/* counter */
#counter {
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  font-size:18px;
  letter-spacing:4px;
  color:white;
  z-index:10;
}

/* dots */
.dot {
  position:absolute;
  border-radius:50%;
  z-index:5;
}

/* modal */
#modal, #authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(15px);
  z-index:9999;
}

.card {
  width:85%;
  padding:30px;
  border-radius:30px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  color:white;
  text-align:center;
}

/* input */
input {
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* button */
button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  color:white;
  font-size:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:3000;
  cursor:pointer;
}

/* MENU */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;
  z-index:2000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

/* item */
.item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 16px;
  border-radius:18px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px);
  color:white;
  font-size:14px;
  font-weight:500;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.25s;
}

.item .icon{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:rgba(255,255,255,0.15);
}

.item .text{
  display:flex;
  flex-direction:column;
}

.item .title{
  font-size:14px;
}

.item .sub{
  font-size:11px;
  opacity:0.6;
}

.item:active{
  transform:scale(0.95);
}

.item.primary{
  background:linear-gradient(135deg,#6a5cff,#b16cff);
}
</style>
</head>

<body>

<div id="counter">20 / 20</div>

<!-- MESSAGE MODAL -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input" placeholder="Thì thầm điều gì đó...">
    <button onclick="send()">SEND</button>
  </div>
</div>

<!-- AUTH MODAL -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle">🔐 Đăng nhập</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="authBtn">Đăng nhập</button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- MENU -->
<div id="menu">

  <div class="item primary" onclick="openLogin()">
    <div class="icon">🔐</div>
    <div class="text">
      <div class="title">Đăng nhập</div>
      <div class="sub">Truy cập tài khoản</div>
    </div>
  </div>

  <div class="item" onclick="openRegister()">
    <div class="icon">✨</div>
    <div class="text">
      <div class="title">Đăng ký</div>
      <div class="sub">Tạo tài khoản mới</div>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.messages = [];

const q = query(collection(db,"thoughts"), orderBy("time","desc"));

onSnapshot(q, (snapshot)=>{
  window.messages = [];
  snapshot.forEach(doc=>{
    window.messages.push(doc.data().msg);
  });
});

window.db=db;
window.addDoc=addDoc;
window.collection=collection;
window.auth=auth;
window.createUserWithEmailAndPassword=createUserWithEmailAndPassword;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;
</script>

<!-- APP -->
<script>
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");
const modal = document.getElementById("modal");
const authModal = document.getElementById("authModal");
const counter = document.getElementById("counter");
const msg = document.getElementById("msg");
const input = document.getElementById("input");
const email = document.getElementById("email");
const password = document.getElementById("password");
const authBtn = document.getElementById("authBtn");

fab.addEventListener("click", ()=>{
  menu.classList.toggle("show");
  fab.innerHTML = menu.classList.contains("show") ? "✕" : "+";
});

/* LOGIN / REGISTER SWITCH */
function openLogin(){
  authModal.style.display = "flex";
  document.getElementById("authTitle").innerText = "🔐 Đăng nhập";
  authBtn.innerText = "Đăng nhập";
  authBtn.onclick = login;
}

function openRegister(){
  authModal.style.display = "flex";
  document.getElementById("authTitle").innerText = "✨ Đăng ký";
  authBtn.innerText = "Tạo tài khoản";
  authBtn.onclick = register;
}

/* dots */
let dots=[];
let available=20;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.used=false;

  let hue=Math.random()*360;
  let size=Math.random()*14+10;

  d.className="dot";
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${hue},70%,70%)`;

  d.x=Math.random()*window.innerWidth;
  d.y=Math.random()*window.innerHeight;
  d.tx=Math.random()*window.innerWidth;
  d.ty=Math.random()*window.innerHeight;

  d.style.left=d.x+"px";
  d.style.top=d.y+"px";

  d.onclick=()=>open(d);

  document.body.appendChild(d);
  dots.push(d);
}

function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*window.innerWidth;
      d.ty=Math.random()*window.innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });
  requestAnimationFrame(animate);
}
animate();

function open(d){
  if(d.used) return;

  d.used=true;
  d.style.opacity=0;
  setTimeout(()=>d.remove(),300);

  available--;
  counter.innerText=available+" / 20";

  msg.innerText = window.messages[Math.floor(Math.random()*window.messages.length)] 
    || "Chưa có ai gửi...";

  modal.style.display="flex";
}

async function send(){
  let text=input.value;

  if(text.trim()!==""){
    await addDoc(collection(db,"thoughts"),{
      msg:text,
      time:Date.now()
    });
  }

  modal.style.display="none";
  input.value="";
}

/* AUTH */
async function login(){
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Đăng nhập thành công ✨");
    authModal.style.display="none";
  }catch{
    alert("Sai tài khoản hoặc mật khẩu");
  }
}

async function register(){
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Tạo tài khoản thành công 🚀");
    authModal.style.display="none";
  }catch{
    alert("Email đã tồn tại hoặc lỗi");
  }
}

/* close modal */
modal.onclick=(e)=>{
  if(e.target.id==="modal") modal.style.display="none";
};

authModal.onclick=(e)=>{
  if(e.target.id==="authModal") authModal.style.display="none";
};
</script>

</body>
</html>
