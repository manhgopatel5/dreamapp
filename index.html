<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* background */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
}

/* counter */
#counter{
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

/* dots */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
}

/* FAB */
#fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;
  z-index:3000;
  cursor:pointer;

  background:linear-gradient(135deg,#6a5cff,#b16cff);
  box-shadow:0 0 25px rgba(150,100,255,0.8);

  transition:0.4s;
}

/* RADIAL MENU */
#menu{
  position:fixed;
  bottom:55px;
  right:55px;
  width:0;
  height:0;
  z-index:2000;
}

.item{
  position:absolute;

  width:70px;
  height:70px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  transform:translate(0,0) scale(0);
  opacity:0;

  transition:0.4s;
}

/* ICON */
.item svg{
  width:26px;
  height:26px;
  fill:white;
}

/* 🌈 NEON GRADIENT + ANIMATION */
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.item{
  background:linear-gradient(270deg,#6a5cff,#00c6ff,#ff0080);
  background-size:400% 400%;
  animation:gradientMove 6s ease infinite;

  box-shadow:
    0 0 20px rgba(255,255,255,0.6),
    0 0 40px rgba(255,0,150,0.5);
}

/* ✨ HOVER GLOW */
.item:active{
  transform:scale(1.2);
  box-shadow:
    0 0 30px white,
    0 0 60px rgba(255,0,200,1);
}

/* OPEN STATE */
#menu.show .item{
  opacity:1;
  transform:scale(1);
}

/* POSITIONS (RADIAL) */
#menu.show .i1{
  transform:translate(-90px,-20px) scale(1);
}

#menu.show .i2{
  transform:translate(-60px,-90px) scale(1);
}

#menu.show .i3{
  transform:translate(0,-120px) scale(1);
}

/* modal */
#modal,#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(15px);
  z-index:9999;
}

.card{
  width:85%;
  padding:30px;
  border-radius:30px;
  background:rgba(255,255,255,0.12);
  color:white;
  text-align:center;
}

input{
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
}
</style>
</head>

<body>

<div id="counter">20 / 20</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- RADIAL MENU -->
<div id="menu">

  <div class="item i1" onclick="openAuth()">
    <svg viewBox="0 0 24 24">
      <path d="M12 1a5 5 0 0 0-5 5v4H6v10h12V10h-1V6a5 5 0 0 0-5-5z"/>
    </svg>
  </div>

  <div class="item i2">
    <svg viewBox="0 0 24 24">
      <path d="M19 12a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"/>
    </svg>
  </div>

  <div class="item i3">
    <svg viewBox="0 0 24 24">
      <path d="M6 2h12v20l-6-3-6 3z"/>
    </svg>
  </div>

</div>

<!-- modal -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input">
    <button onclick="send()">SEND</button>
  </div>
</div>

<div id="authModal">
  <div class="card">
    <h3>Login</h3>
    <input id="email">
    <input id="password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");

fab.onclick=()=>{
  menu.classList.toggle("show");
  fab.innerHTML = menu.classList.contains("show") ? "✕" : "+";
};

/* dots */
let dots=[];
for(let i=0;i<20;i++){
  let d=document.createElement("div");

  let size=Math.random()*14+10;
  d.className="dot";
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${Math.random()*360},70%,70%)`;

  d.x=Math.random()*innerWidth;
  d.y=Math.random()*innerHeight;
  d.tx=Math.random()*innerWidth;
  d.ty=Math.random()*innerHeight;

  d.style.left=d.x+"px";
  d.style.top=d.y+"px";

  document.body.appendChild(d);
  dots.push(d);
}

function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*innerWidth;
      d.ty=Math.random()*innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });
  requestAnimationFrame(animate);
}
animate();

function openAuth(){
  document.getElementById("authModal").style.display="flex";
}
</script>

</body>
</html>
