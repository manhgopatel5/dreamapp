<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system, sans-serif;
}

/* BACKGROUND */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  z-index:0;
  filter:brightness(0.75);
}

/* TITLE */
#title{
  position:fixed;
  top:35%;
  width:100%;
  text-align:center;
  z-index:20;
}

#title h1{
  margin:0;
  font-size:48px;
  font-weight:900;
  background:linear-gradient(90deg,#ff2d2d,#ff6a00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(255,80,80,0.8);
}

#title h2{
  margin-top:5px;
  font-size:22px;
  background:linear-gradient(90deg,#ffd000,#ff9900);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* DOT */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
  cursor:pointer;
  transition:0.3s;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  z-index:5000;
  cursor:pointer;
  box-shadow:0 0 20px rgba(177,108,255,0.6);
}

/* MENU */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;
  z-index:4000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  padding:12px 18px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  color:white;
  backdrop-filter:blur(10px);
  cursor:pointer;
}

/* AUTH MODAL */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.75);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
}
</style>
</head>

<body>

<!-- TITLE -->
<div id="title">
  <h1>BATTLE</h1>
  <h2>SOCIAL</h2>
</div>

<!-- AUTH -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- MENU -->
<div id="menu"></div>

<script>
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");

const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");
const authBtn = document.getElementById("authBtn");

/* MENU */
fab.onclick = () => {
  menu.classList.toggle("show");
};

menu.innerHTML = `
  <div class="item" onclick="openLogin()">Đăng nhập</div>
  <div class="item" onclick="openRegister()">Đăng ký</div>
`;

/* AUTH */
function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng nhập";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng ký";
  authBtn.innerText="Register";
}

authModal.onclick = (e)=>{
  if(e.target === authModal){
    authModal.style.display = "none";
  }
};

/* DOT SYSTEM (KHÔNG CÒN NỘI DUNG) */
let dots=[];

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.className="dot";

  let size = Math.random()*12+10;
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${Math.random()*360},70%,70%)`;

  d.x=Math.random()*innerWidth;
  d.y=Math.random()*innerHeight;
  d.tx=Math.random()*innerWidth;
  d.ty=Math.random()*innerHeight;

  /* CLICK = CHỈ BIẾN MẤT */
  d.onclick=()=>{
    d.style.transform="scale(0)";
    d.style.opacity=0;
    setTimeout(()=>d.remove(),300);
  };

  document.body.appendChild(d);
  dots.push(d);
}

/* ANIMATION */
function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.015;
    d.y+=(d.ty-d.y)*0.015;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*innerWidth;
      d.ty=Math.random()*innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
