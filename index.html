<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system;
}

/* BACKGROUND */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  filter:brightness(0.85);
}

/* CANVAS */
canvas{
  position:fixed;
  inset:0;
}

/* TITLE */
#title{
  position:fixed;
  top:32%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.main{
  font-size:60px;
  font-weight:900;
  color:red;
  text-shadow:0 0 25px red;
}

.sub{
  font-size:42px;
  margin-top:-10px;
  color:orange;
  text-shadow:0 0 20px orange;
}

/* BUTTONS */
#actions{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:20px;
}

/* BUTTON */
.btn{
  width:110px;
  height:110px;
  border-radius:50%;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-align:center;
  color:white;
  font-weight:700;
  text-transform:uppercase;
  line-height:1.1;
  cursor:pointer;
}

/* TEXT */
.btn span{
  display:block;
  letter-spacing:1px;
}

/* LOGIN */
.login{
  background:linear-gradient(#4da6ff,#6a5cff);
  box-shadow:0 0 25px #4da6ff;
}

/* REGISTER */
.register{
  background:linear-gradient(#ff4d4d,#ff9f00);
  box-shadow:0 0 25px #ff4d4d;
}

/* MODAL */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.8);
  color:white;
  text-align:center;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- TITLE -->
<div id="title">
  <div class="main">BATTLE</div>
  <div class="sub">SOCIAL</div>
</div>

<!-- BUTTON -->
<div id="actions">
  <div class="btn login" onclick="openLogin()">
    <span>ĐĂNG</span>
    <span>NHẬP</span>
  </div>

  <div class="btn register" onclick="openRegister()">
    <span>ĐĂNG</span>
    <span>KÝ</span>
  </div>
</div>

<!-- MODAL -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên">
    <button id="authBtn"></button>
  </div>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
onresize=resize;

/* AUTH */
const modal=document.getElementById("authModal");
const title=document.getElementById("authTitle");
const btn=document.getElementById("authBtn");

function openLogin(){
  modal.style.display="flex";
  title.innerText="Đăng nhập";
  btn.innerText="Login";
}

function openRegister(){
  modal.style.display="flex";
  title.innerText="Đăng ký";
  btn.innerText="Register";
}

modal.onclick=e=>{
  if(e.target===modal) modal.style.display="none";
};

/* PARTICLES */
let dots=[];
let touches={};

for(let i=0;i<20;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*3,
    vy:(Math.random()-0.5)*3,
    size:10+Math.random()*8,
    color:`hsl(${Math.random()*360},70%,70%)`
  });
}

/* TOUCH */
canvas.addEventListener("touchstart",e=>{
  for(let t of e.touches){
    touches[t.identifier]={x:t.clientX,y:t.clientY};
  }
});

canvas.addEventListener("touchmove",e=>{
  for(let t of e.touches){
    touches[t.identifier]={x:t.clientX,y:t.clientY};
  }
});

canvas.addEventListener("touchend",e=>{
  for(let t of e.changedTouches){
    delete touches[t.identifier];
  }
});

/* ANIMATE */
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    /* bounce */
    if(d.x<0||d.x>canvas.width) d.vx*=-1;
    if(d.y<0||d.y>canvas.height) d.vy*=-1;

    /* touch repel */
    for(let id in touches){
      let t=touches[id];
      let dx=d.x-t.x;
      let dy=d.y-t.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        d.vx+=dx/dist*2;
        d.vy+=dy/dist*2;
      }
    }
  });

  /* COLLISION */
  for(let i=0;i<dots.length;i++){
    for(let j=i+1;j<dots.length;j++){

      let a=dots[i];
      let b=dots[j];

      let dx=b.x-a.x;
      let dy=b.y-a.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      let min=a.size/2+b.size/2;

      if(dist<min){

        let nx=dx/dist;
        let ny=dy/dist;
        let overlap=min-dist;

        a.x-=nx*overlap/2;
        a.y-=ny*overlap/2;
        b.x+=nx*overlap/2;
        b.y+=ny*overlap/2;

        a.vx-=nx*1.5;
        a.vy-=ny*1.5;
        b.vx+=nx*1.5;
        b.vy+=ny*1.5;
      }
    }
  }

  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.size/2,0,Math.PI*2);
    ctx.fillStyle=d.color;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
