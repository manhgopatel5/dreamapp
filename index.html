<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

/* background */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  opacity:0.5;
}

/* canvas */
canvas{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* CONFIG */
const COUNT = 70;
const MAX_DIST = 130;
const CENTER_FORCE = 0.0004;
const REPULSION = 0.05;

/* TOUCH */
let touches = {};

/* DOT */
let dots = [];

for(let i=0;i<COUNT;i++){
  dots.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2,
    size: Math.random()*2+2
  });
}

/* TOUCH EVENTS */
canvas.addEventListener("touchstart",e=>{
  for(let t of e.touches){
    touches[t.identifier] = {
      x:t.clientX,
      y:t.clientY,
      vx:0,
      vy:0
    };
  }
});

canvas.addEventListener("touchmove",e=>{
  for(let t of e.touches){
    let prev = touches[t.identifier];
    if(prev){
      prev.vx = t.clientX - prev.x;
      prev.vy = t.clientY - prev.y;
      prev.x = t.clientX;
      prev.y = t.clientY;
    }
  }
});

canvas.addEventListener("touchend",e=>{
  for(let t of e.changedTouches){
    delete touches[t.identifier];
  }
});

/* mouse support */
canvas.addEventListener("mousemove",e=>{
  touches["mouse"] = {
    x:e.clientX,
    y:e.clientY,
    vx:0,
    vy:0
  };
});

/* ANIMATE */
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* MOVE */
  dots.forEach(d=>{

    /* center gravity */
    let cx = canvas.width/2;
    let cy = canvas.height/2;

    d.vx += (cx - d.x) * CENTER_FORCE;
    d.vy += (cy - d.y) * CENTER_FORCE;

    /* TOUCH INTERACTION */
    for(let id in touches){
      let t = touches[id];

      let dx = t.x - d.x;
      let dy = t.y - d.y;
      let dist = Math.sqrt(dx*dx+dy*dy);

      /* hút */
      if(dist < 200){
        d.vx += dx * 0.002;
        d.vy += dy * 0.002;
      }

      /* đẩy mạnh khi vuốt */
      if(dist < 80){
        d.vx += t.vx * 0.2;
        d.vy += t.vy * 0.2;
      }

      /* shockwave */
      if(dist < 50){
        let angle = Math.atan2(dy,dx);
        d.vx -= Math.cos(angle)*1.5;
        d.vy -= Math.sin(angle)*1.5;
      }
    }

    d.x += d.vx;
    d.y += d.vy;

    /* friction */
    d.vx *= 0.98;
    d.vy *= 0.98;

    /* bounce */
    if(d.x<0 || d.x>canvas.width) d.vx*=-1;
    if(d.y<0 || d.y>canvas.height) d.vy*=-1;
  });

  /* DOT INTERACTION */
  for(let i=0;i<dots.length;i++){
    for(let j=i+1;j<dots.length;j++){

      let a = dots[i];
      let b = dots[j];

      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let dist = Math.sqrt(dx*dx+dy*dy);

      /* line */
      if(dist < MAX_DIST){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.strokeStyle = "rgba(170,140,255,"+(1 - dist/MAX_DIST)+")";
        ctx.stroke();
      }

      /* repulsion */
      if(dist < 30){
        let angle = Math.atan2(dy,dx);
        let force = (30 - dist) * REPULSION;

        a.vx += Math.cos(angle)*force;
        a.vy += Math.sin(angle)*force;

        b.vx -= Math.cos(angle)*force;
        b.vy -= Math.sin(angle)*force;
      }
    }
  }

  /* DRAW */
  dots.forEach(d=>{
    ctx.beginPath();

    let g = ctx.createRadialGradient(
      d.x,d.y,0,
      d.x,d.y,d.size*6
    );

    g.addColorStop(0,"rgba(180,150,255,1)");
    g.addColorStop(1,"rgba(180,150,255,0)");

    ctx.fillStyle = g;
    ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

/* resize */
onresize = ()=>{
  canvas.width = innerWidth;
  canvas.height = innerHeight;
};
</script>

</body>
</html>
