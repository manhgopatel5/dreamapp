<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: -apple-system, sans-serif;
  background: url("IMG_0577.jpeg") no-repeat center/cover;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35); /* 👈 làm tối nhẹ cho nổi dot */
  backdrop-filter: blur(15px);
  pointer-events: none;
}
/* counter */
#counter {
  position: absolute;
  top: 50px;
  width: 100%;
  text-align: center;
  color: rgba(0,0,0,0.4);
  font-size: 12px;
  letter-spacing: 3px;
}

/* dots */
.dot {
  position: absolute;
  border-radius: 50%;
  transition: transform 0.2s;
}

.dot:active {
  transform: scale(1.8);
}

/* modal */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter: blur(12px);
}

/* card */
.card {
  width:85%;
  padding:30px;
  border-radius:30px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  text-align:center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* text */
#msg {
  font-size:18px;
  color:#111;
}

/* input */
input {
  width:100%;
  margin-top:20px;
  padding:10px;
  border:none;
  border-bottom:1px solid #ccc;
  background:none;
  font-size:14px;
}

/* button */
button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
  letter-spacing:2px;
}
</style>
</head>

<body>

<div id="counter">20 / 20 </div>

<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input placeholder="Thì thầm điều gì đó...">
    <button onclick="send()">SEND</button>
  </div>
</div>

<script>
document.body.addEventListener("click", () => {
  popSound.play().then(()=>{
    popSound.pause();
    popSound.currentTime = 0;
  }).catch(()=>{});
}, { once: true });
let popSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
let dots = [];
let available = 20;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
d.used = false; // đã mở chưa
let hue = Math.random() * 360;
let size = Math.random()*14 + 10;

d.className="dot";
d.style.width=size+"px";
d.style.height=size+"px";

// màu random
d.style.background = `hsl(${hue}, 70%, 70%)`;
d.style.boxShadow = `0 0 20px hsl(${hue}, 80%, 80%)`;

// glow random
d.style.boxShadow = `0 0 ${10 + Math.random()*25}px hsl(${hue}, 80%, 70%)`;

  d.x=Math.random()*window.innerWidth;
  d.y=Math.random()*window.innerHeight;

  d.tx=Math.random()*window.innerWidth;
  d.ty=Math.random()*window.innerHeight;

  d.msg="Một suy nghĩ vô danh #" + (i+1);

  d.style.left=d.x+"px";
  d.style.top=d.y+"px";

  d.onclick=()=>open(d);

  document.body.appendChild(d);
  dots.push(d);
}
setInterval(()=>{
  dots.forEach(d=>{
    let scale = 0.9 + Math.random()*0.4;
    d.style.transform = `scale(${scale})`;
  });
}, 800);
function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*window.innerWidth;
      d.ty=Math.random()*window.innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });

  requestAnimationFrame(animate);
}
animate();

let current=null;

function open(d){
  if(d.used) return;

  d.used = true;
  current = d;

  // rung
  if (navigator.vibrate) navigator.vibrate(30);

  // âm thanh pop
  popSound.currentTime = 0;
  popSound.play().catch(()=>{});

  // hiệu ứng biến mất
  d.style.transition = "all 0.3s ease";
  d.style.transform = "scale(2)";
  d.style.opacity = "0";

  setTimeout(()=>{
    d.remove();
  }, 300);

  available--;
  document.getElementById("counter").innerText =
    available + " / 20";

  document.getElementById("msg").innerText = d.msg;
  document.getElementById("modal").style.display = "flex";
}
function send(){
  if(current){
    current.remove();
    available--;

    document.getElementById("counter").innerText =
      available + " / 20";
  }

  document.getElementById("modal").style.display="none";
}
document.getElementById("modal").onclick = (e)=>{
  if(e.target.id === "modal"){
    document.getElementById("modal").style.display = "none";
  }
};
</script>

</body>
</html>
