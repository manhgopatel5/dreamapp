<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system;
}

/* BACKGROUND */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  z-index:0;
  filter:brightness(0.8);
}

/* COUNTER */
#counter{
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
  font-weight:600;
}

/* DOT */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
  cursor:pointer;
  transition:0.3s;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  z-index:5000;
  cursor:pointer;
  box-shadow:0 0 20px rgba(177,108,255,0.6);
}

/* MENU */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;

  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;
  z-index:4000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  padding:12px 18px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  color:white;
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:0.2s;
}

.item:hover{
  transform:scale(1.05);
}

/* MODAL */
#modal,#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
  z-index:9999;
  animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.75);
  color:white;
  animation:pop 0.25s ease;
}

@keyframes pop{
  from{transform:scale(0.8);opacity:0}
  to{transform:scale(1);opacity:1}
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
  font-weight:600;
}
</style>
</head>

<body>

<div id="counter">20 / 20</div>

<!-- MESSAGE -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <input id="input" placeholder="Nhập tin...">
    <button onclick="send()">Gửi</button>
  </div>
</div>

<!-- AUTH -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="displayName" placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- MENU -->
<div id="menu"></div>

<script>
/* ELEMENT */
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");

const modal = document.getElementById("modal");
const msg = document.getElementById("msg");
const input = document.getElementById("input");
const counter = document.getElementById("counter");

const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");
const authBtn = document.getElementById("authBtn");

/* MENU */
fab.onclick = () => {
  menu.classList.toggle("show");
};

function renderMenu(){
  menu.innerHTML = `
    <div class="item" onclick="openLogin()">Đăng nhập</div>
    <div class="item" onclick="openRegister()">Đăng ký</div>
  `;
}
renderMenu();

/* AUTH */
function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng nhập";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng ký";
  authBtn.innerText="Register";
}

/* CLICK OUTSIDE CLOSE */
authModal.onclick = (e)=>{
  if(e.target === authModal){
    authModal.style.display = "none";
  }
};

modal.onclick = (e)=>{
  if(e.target === modal){
    modal.style.display = "none";
  }
};

/* DOT SYSTEM */
let dots=[], available=20;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.className="dot";

  let size = Math.random()*12+10;
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${Math.random()*360},70%,70%)`;

  d.x=Math.random()*innerWidth;
  d.y=Math.random()*innerHeight;
  d.tx=Math.random()*innerWidth;
  d.ty=Math.random()*innerHeight;

  d.onclick=()=>openDot(d);

  document.body.appendChild(d);
  dots.push(d);
}

/* ANIMATION */
function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.015;
    d.y+=(d.ty-d.y)*0.015;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*innerWidth;
      d.ty=Math.random()*innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });

  requestAnimationFrame(animate);
}
animate();

/* CLICK DOT */
function openDot(d){
  if(d.used) return;

  d.used=true;
  d.style.transform="scale(0)";
  d.style.opacity=0;

  setTimeout(()=>d.remove(),300);

  available--;
  counter.innerText=available+" / 20";

  msg.innerText="Một lời nhắn ngẫu nhiên ✨";
  modal.style.display="flex";
}

/* SEND */
function send(){
  modal.style.display="none";
  input.value="";
}
</script>

</body>
</html>
