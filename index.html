<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  overflow:hidden;
  position:relative;
}

/* nền */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
  pointer-events:none;
}

/* dot */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5; /* 👈 nổi lên */
}

/* modal đọc */
#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(12px);
  z-index:9999; /* 👈 trên cùng */
}

/* modal auth */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(12px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:white;
  text-align:center;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  color:white;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
  cursor:pointer;
}

/* menu */
#menu{
  position:fixed;
  bottom:90px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transform:translateY(20px);
  transition:0.3s;
  z-index:1000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  background:black;
  color:white;
  padding:10px;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- modal đọc -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
  </div>
</div>

<!-- modal auth -->
<div id="authModal">
  <div class="card">
    <h3>Đăng nhập / Đăng ký</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<div id="menu">
  <div class="item" onclick="openAuth()">Đăng nhập</div>
  <div class="item">Cài đặt</div>
  <div class="item">Điều khoản</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLz0V7iQY-r05cbNQ3Wkz58_p-N-b_HOQ",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
  appId: "1:225789506365:web:24270adca14c2d85864b54"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.auth = auth;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;

// realtime dots
let dots=[];
const q=query(collection(db,"thoughts"),orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
  dots.forEach(d=>d.remove());
  dots=[];

  snapshot.forEach(doc=>{
    let data=doc.data();

    let d=document.createElement("div");
    let size=12+Math.random()*10;

    d.className="dot";
    d.style.width=size+"px";
    d.style.height=size+"px";
    d.style.background="white";

    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top=Math.random()*window.innerHeight+"px";

    d.onclick=()=>{
      document.getElementById("msg").innerText=data.msg;
      document.getElementById("modal").style.display="flex";
    };

    document.body.appendChild(d);
    dots.push(d);
  });
});
</script>

<!-- APP -->
<script>
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");

fab.onclick = ()=>{
  menu.classList.toggle("show");
  fab.style.transform = menu.classList.contains("show") ? "rotate(45deg)" : "rotate(0)";
};

function openAuth(){
  document.getElementById("authModal").style.display="flex";
}

// login
async function login(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
  alert("Đăng nhập thành công");
}

// register
async function register(){
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("Đăng ký thành công");
}

// đóng modal
document.getElementById("modal").onclick=(e)=>{
  if(e.target.id==="modal"){
    modal.style.display="none";
  }
};

document.getElementById("authModal").onclick=(e)=>{
  if(e.target.id==="authModal"){
    authModal.style.display="none";
  }
};
</script>

</body>
</html>
