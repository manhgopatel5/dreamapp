<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  overflow:hidden;
  position:relative;
}

/* nền */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:contain;
  z-index:0;
  pointer-events:none;
}

/* counter */
#counter{
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

/* dot */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
}

/* modal */
#modal, #authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(12px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:white;
  text-align:center;
}

input{
  width:100%;
  margin-top:10px;
  padding:10px;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

/* menu */
#menu{
  position:fixed;
  bottom:90px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:1000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
}

.item{
  background:black;
  color:white;
  padding:10px;
  border-radius:20px;
}
</style>
</head>

<body>

<div id="counter">...</div>

<!-- đọc message -->
<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <div id="author" style="font-size:12px;color:#666;margin-top:10px"></div>
  </div>
</div>

<!-- auth -->
<div id="authModal">
  <div class="card">
    <h3>Đăng nhập / Đăng ký</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="name" placeholder="Tên hiển thị">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<div id="menu">
  <div class="item" onclick="openAuth()">Tài khoản</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLz0V7iQY-r05cbNQ3Wkz58_p-N-b_HOQ",
  authDomain: "dreamapp-ae631.firebaseapp.com",
  projectId: "dreamapp-ae631",
  appId: "1:225789506365:web:24270adca14c2d85864b54"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// global
window.db=db;
window.auth=auth;
window.addDoc=addDoc;
window.collection=collection;

let currentUser = null;

// 🔥 theo dõi login
onAuthStateChanged(auth,(user)=>{
  currentUser=user;
});

// 🔥 realtime message
let dots=[];
const q=query(collection(db,"thoughts"),orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
  dots.forEach(d=>d.remove());
  dots=[];

  let count=0;

  snapshot.forEach(docu=>{
    let data=docu.data();

    let d=document.createElement("div");

    let size=12+Math.random()*10;

    d.className="dot";
    d.style.width=size+"px";
    d.style.height=size+"px";
    d.style.background="white";

    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top=Math.random()*window.innerHeight+"px";

    d.onclick=()=>{
      msg.innerText=data.msg;
      author.innerText="by "+(data.name || "ẩn danh");
      modal.style.display="flex";
    };

    document.body.appendChild(d);
    dots.push(d);
    count++;
  });

  counter.innerText=count+" messages";
});

// global
window.currentUser=()=>currentUser;
window.setDoc=setDoc;
window.doc=doc;
window.createUserWithEmailAndPassword=createUserWithEmailAndPassword;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;
</script>

<!-- APP -->
<script>
// FAB
fab.onclick=()=>{
  menu.classList.toggle("show");
};

function openAuth(){
  authModal.style.display="flex";
}

// REGISTER
async function register(){
  let user=await createUserWithEmailAndPassword(auth,email.value,password.value);

  // lưu profile
  await setDoc(doc(db,"users",user.user.uid),{
    name:name.value,
    email:email.value
  });

  alert("Đăng ký xong");
}

// LOGIN
async function login(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
  alert("Đăng nhập xong");
}

// GỬI MESSAGE
async function send(){
  if(!currentUser()){
    alert("Phải đăng nhập");
    return;
  }

  await addDoc(collection(db,"thoughts"),{
    msg:input.value,
    user:currentUser().uid,
    name:name.value || "ẩn danh",
    time:Date.now()
  });

  modal.style.display="none";
}

// đóng modal
modal.onclick=(e)=>{
  if(e.target.id==="modal") modal.style.display="none";
};

authModal.onclick=(e)=>{
  if(e.target.id==="authModal") authModal.style.display="none";
};
</script>

</body>
</html>
