<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system, sans-serif;
}

/* BACKGROUND NGOÀI */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("IMG_0577.jpeg") no-repeat center;
  background-size:cover;
  z-index:0;
  filter:brightness(0.75);

  /* FIX QUAN TRỌNG */
  opacity: var(--bgOpacity,1);
  transition:0.3s;
}

/* LOGO */
#title{
  position:fixed;
  top:30%;
  width:100%;
  text-align:center;
  z-index:20;
}

/* DOT */
.dot{
  position:absolute;
  border-radius:50%;
  z-index:5;
  cursor:pointer;
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
  z-index:5000;
}

/* MENU */
#menu{
  position:fixed;
  bottom:100px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  opacity:0;
  pointer-events:none;
  transform:translateY(30px);
  transition:0.3s;
  z-index:4000;
}

#menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.item{
  padding:12px 18px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  color:white;
}

/* AUTH */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(20px);
  z-index:9999;
}

.card{
  width:85%;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.75);
  color:white;
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6a5cff,#b16cff);
  color:white;
  width:100%;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="title">
  <div>BATTLE SOCIAL</div>
</div>

<!-- AUTH -->
<div id="authModal">
  <div class="card">
    <h3 id="authTitle"></h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <input placeholder="Tên (đăng ký)">
    <button id="authBtn"></button>
  </div>
</div>

<!-- FAB -->
<div id="fab">+</div>

<!-- MENU -->
<div id="menu"></div>

<script>
const fab = document.getElementById("fab");
const menu = document.getElementById("menu");

const authModal = document.getElementById("authModal");
const authTitle = document.getElementById("authTitle");
const authBtn = document.getElementById("authBtn");

/* MENU */
fab.onclick = () => {
  menu.classList.toggle("show");
};

menu.innerHTML = `
  <div class="item" onclick="openLogin()">Đăng nhập</div>
  <div class="item" onclick="openRegister()">Đăng ký</div>
`;

/* AUTH */
function openLogin(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng nhập";
  authBtn.innerText="Login";
}

function openRegister(){
  authModal.style.display="flex";
  authTitle.innerText="Đăng ký";
  authBtn.innerText="Register";
}

authModal.onclick = (e)=>{
  if(e.target === authModal){
    authModal.style.display = "none";
  }
};

/* DOT */
let dots=[];
for(let i=0;i<20;i++){
  let d=document.createElement("div");
  d.className="dot";
  let size = Math.random()*12+10;
  d.style.width=size+"px";
  d.style.height=size+"px";
  d.style.background=`hsl(${Math.random()*360},70%,70%)`;
  d.x=Math.random()*innerWidth;
  d.y=Math.random()*innerHeight;
  document.body.appendChild(d);
  dots.push(d);
}

function animate(){
  dots.forEach(d=>{
    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });
  requestAnimationFrame(animate);
}
animate();

/* GAME SYSTEM */
let currentUser=null;
let userData=null;

authBtn.onclick=()=>{
  let inputs=authModal.querySelectorAll("input");
  let user=inputs[0].value;
  let pass=inputs[1].value;

  if(authTitle.innerText==="Đăng ký"){
    let data={pass:pass,coin:100};
    localStorage.setItem("user_"+user,JSON.stringify(data));
    alert("OK");
  }else{
    let data=JSON.parse(localStorage.getItem("user_"+user));
    if(!data || data.pass!==pass){
      alert("Sai");
      return;
    }
    currentUser=user;
    userData=data;
    startGame();
  }
};

function startGame(){
  authModal.style.display="none";

  document.getElementById("gameScreen").style.display="block";
  document.getElementById("title").style.display="none";

  /* ẨN NỀN NGOÀI */
  document.body.style.setProperty("--bgOpacity","0");

  /* ẨN DOT */
  document.querySelectorAll(".dot").forEach(d=>{
    d.style.display="none";
  });

  document.getElementById("g_name").innerText=currentUser;
  document.getElementById("g_coin").innerText=userData.coin;
}

function logout(){
  location.reload();
}
</script>

<!-- GAME SCREEN -->
<div id="gameScreen" 
style="
display:none;
position:fixed;
inset:0;
background-image:url('https://manhgopatel5.github.io/dreamapp/5C41187C-9AD8-4C7F-8AA1-5AD53A68C4FE.png');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:99999;
">

  <div style="display:flex; justify-content:space-between; padding:10px; background:#0008;">
    <div id="g_name"></div>
    <div>💰 <span id="g_coin">100</span></div>
  </div>

  <div style="position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#111; padding:10px;">
    <div onclick="logout()">🚪 Logout</div>
  </div>

</div>

</body>
</html>
